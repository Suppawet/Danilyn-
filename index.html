<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Invite 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #cceeff;
  overflow: hidden;
}

/* 🧠 จัดกลางทั้งหน้า */
.stage {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 🎥 กล่องวิดีโอ */
.video-box {
  position: relative;
  width: 220px;
  height: 220px;
}

/* 🎥 วิดีโอ = background */
#catDance {
  width: 100%;
  height: 100%;
  border-radius: 15px;
  object-fit: cover;
  display: none;
}

/* 💙 ข้อความ = อยู่บนวิดีโอแน่นอน */
#result {
  position: absolute;
  inset: 0;

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 20px;
  font-weight: bold;
  color: white;
  text-shadow: 0 2px 10px black;

  display: none;
}

/* 🖼️ รูป */
#mainImage {
  width: 200px;
  border-radius: 15px;
  margin-bottom: 10px;
}

/* 🔘 ปุ่ม */
button {
  margin-top: 15px;
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  background: #28a745;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="stage">

  <h1>You are invited 💙</h1>

  <img id="mainImage" src="your-image.jpg">

  <div class="video-box">

    <video id="catDance" loop muted playsinline>
      <source src="scuba-cat.mp4" type="video/mp4">
    </video>

    <div id="result">
      YAYYY 💙 See you tomorrow 😆🎬
    </div>

  </div>

  <button onclick="sayYes()">Yes 💙</button>

</div>

<audio id="yesSound" src="yes.mp3"></audio>
<audio id="scubaMusic" src="scuba.mp3" loop></audio>

<script>
function sayYes() {

  document.getElementById("yesSound").play();

  setTimeout(() => {
    document.getElementById("scubaMusic").play();
  }, 300);

  // 🖼️ hide image
  document.getElementById("mainImage").style.display = "none";

  // 🎥 show video
  const v = document.getElementById("catDance");
  v.style.display = "block";
  v.currentTime = 0;
  v.play();

  // 💙 show text (ชัวร์ 100%)
  document.getElementById("result").style.display = "flex";
}
</script>

</body>
</html>
