<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Invite 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #cceeff;
  overflow: hidden;
}

/* 🧠 หน้าเริ่ม */
.stage {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 🖼️ รูปเริ่ม */
#mainImage {
  width: 200px;
  border-radius: 15px;
}

/* 🎥 fullscreen overlay */
#videoOverlay {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
}

/* 🎥 วิดีโอเต็มจอ */
#catDance {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 💙 ข้อความบนวิดีโอ */
#overlayText {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;

  font-size: 22px;
  font-weight: bold;
  color: white;
  text-shadow: 0 2px 10px black;
}

/* 🔘 ปุ่ม */
button {
  margin-top: 15px;
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  background: #28a745;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="stage">

  <h1>You are invited 💙</h1>

  <img id="mainImage" src="your-image.jpg">

  <button onclick="sayYes()">Yes 💙</button>

</div>

<!-- 🎥 FULLSCREEN VIDEO OVERLAY -->
<div id="videoOverlay">

  <video id="catDance" loop muted playsinline>
    <source src="scuba-cat.mp4" type="video/mp4">
  </video>

  <div id="overlayText">
    YAYYY 💙 See you tonight at 8 PM mahal :)
  </div>

</div>

<audio id="yesSound" src="yes.mp3"></audio>
<audio id="scubaMusic" src="scuba.mp3" loop></audio>

<script>
function sayYes() {

  document.getElementById("yesSound").play();

  setTimeout(() => {
    document.getElementById("scubaMusic").play();
  }, 300);

  // 🖼️ hide everything
  document.querySelector(".stage").style.display = "none";

  // 🎥 show fullscreen overlay
  const overlay = document.getElementById("videoOverlay");
  overlay.style.display = "flex";

  const video = document.getElementById("catDance");
  video.currentTime = 0;
  video.play();
}
</script>

</body>
</html>
