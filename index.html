<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Invite 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #cceeff;

  /* 🔥 สำคัญที่สุด: ทำทั้งหน้าเป็น flex center */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  height: 100vh;
  overflow: hidden;
}

h1 {
  color: #0077cc;
  text-align: center;
  padding: 10px;
}

/* 🎯 media อยู่กลางจริง 100% */
.media-box {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 220px;
}

#mainImage,
#catDance {
  width: 200px;
  border-radius: 15px;
}

/* 🎥 ซ่อนวิดีโอ */
#catDance {
  display: none;
}

/* ปุ่ม */
.buttons {
  margin-top: 20px;
  position: relative;
  width: 300px;
  height: 120px;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  position: absolute;
}

#yesBtn {
  background: #28a745;
  color: white;
  left: 0;
}

#noBtn {
  background: #dc3545;
  color: white;
  right: 0;
}

#result {
  margin-top: 15px;
  font-size: 22px;
  color: #0077cc;
  font-weight: bold;
}
</style>
</head>

<body>

<h1 id="question">
You are invited to watch a movie with <br>
<b>Namo Suppawet</b> <br>
tomorrow at 8 PM 🎬
</h1>

<!-- 🎯 กลางจริง -->
<div class="media-box">
  <img id="mainImage" src="your-image.jpg">

  <video id="catDance" loop muted playsinline>
    <source src="scuba-cat.mp4" type="video/mp4">
  </video>
</div>

<div class="buttons">
  <button id="yesBtn" onclick="sayYes()">Yes 💙</button>
  <button id="noBtn">No 😭</button>
</div>

<div id="result"></div>

<audio id="yesSound" src="yes.mp3"></audio>
<audio id="noSound" src="no.mp3"></audio>
<audio id="scubaMusic" src="scuba.mp3" loop></audio>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const area = document.querySelector(".buttons");

let noClick = 0;

noBtn.addEventListener("click", (e) => {
  e.preventDefault();

  document.getElementById("noSound").play();

  const messages = [
    "Really? 🥺",
    "Think again 😭",
    "Come on...",
    "Please 😢",
    "Just say yes 💔"
  ];

  document.getElementById("question").innerText =
    messages[Math.min(noClick, messages.length - 1)];

  noClick++;

  const maxX = area.clientWidth - noBtn.offsetWidth;
  noBtn.style.left = Math.random() * maxX + "px";
});

function sayYes() {
  document.getElementById("yesSound").play();

  setTimeout(() => {
    document.getElementById("scubaMusic").play();
  }, 500);

  document.getElementById("result").innerText =
    "YAYYY 💙 See you tomorrow 🎬";

  document.getElementById("mainImage").style.display = "none";

  const v = document.getElementById("catDance");
  v.style.display = "block";
  v.currentTime = 0;
  v.play();
}
</script>

</body>
</html>
