<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Invite 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #cceeff;
  height: 100vh;
  overflow: hidden;
}

.container {
  margin-top: 40px;
}

h1 {
  color: #0077cc;
  padding: 0 20px;
}

.buttons {
  position: relative;
  height: 300px;
  width: 100%;
  margin-top: 30px;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  position: absolute;
  transition: 0.2s;
}

#yesBtn {
  background: #28a745;
  color: white;
  left: 35%;
  top: 50%;
  transform: scale(1);
}

#noBtn {
  background: #dc3545;
  color: white;
  left: 55%;
  top: 50%;
}

#result {
  margin-top: 20px;
  font-size: 24px;
  color: #0077cc;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="question">
    You are invited to watch a movie with <br>
    <b>Namo Suppawet</b> <br>
    tomorrow at 8 PM 🎬
  </h1>

  <div class="buttons" id="btnArea">
    <button id="yesBtn" onclick="sayYes()">Yes 💙</button>
    <button id="noBtn">No 😭</button>
  </div>

  <div id="result"></div>

  <!-- 🔊 เสียง (เวอร์ชันมีม) -->
  <audio id="yesSound" src="https://www.myinstants.com/media/sounds/yes-yes-yes-yes.mp3"></audio>
  <audio id="noSound" src="https://www.myinstants.com/media/sounds/speed-please.mp3"></audio>

</div>

<script>
let yesSize = 1;
let noClickCount = 0;

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const area = document.getElementById("btnArea");

// ❌ ปุ่ม No หนี (เฉพาะตอนกด)
function moveNo() {
  const maxX = area.clientWidth - noBtn.offsetWidth;
  const maxY = area.clientHeight - noBtn.offsetHeight;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

// ❌ กด No → หนี + เสียง + ง้อ
noBtn.addEventListener("click", (e) => {
  e.preventDefault(); // กันกดทัน

  document.getElementById("noSound").play();

  noClickCount++;

  const messages = [
    "Really? 🥺",
    "Think again 😭",
    "Come on, please...",
    "I really want to go with you 😢",
    "Just say yes 💔",
    "PLEASE 😭💙"
  ];

  document.getElementById("question").innerText =
    messages[Math.min(noClickCount, messages.length - 1)];

  // ขยาย Yes
  yesSize += 0.3;
  yesBtn.style.transform = `scale(${yesSize})`;

  // หนีหลังจากกด
  setTimeout(moveNo, 50);
});

// ✅ กด Yes
function sayYes() {
  document.getElementById("yesSound").play();

  document.getElementById("result").innerText =
    "YAYYY 💙 See you tomorrow at 8 PM 😆🎬";

  for (let i = 0; i < 20; i++) {
    createHeart();
  }
}

// 💙 หัวใจลอย
function createHeart() {
  const heart = document.createElement("div");
  heart.innerText = "💙";
  heart.style.position = "fixed";
  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.top = window.innerHeight + "px";
  heart.style.fontSize = "24px";
  heart.style.animation = "floatUp 2s linear";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 2000);
}

// animation
const style = document.createElement("style");
style.innerHTML = `
@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-300px); opacity: 0; }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
