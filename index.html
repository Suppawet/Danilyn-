<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Invite 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #cceeff;
}

/* 🧠 ล็อกทั้งหน้ากลางจริง */
.stage {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 📝 ข้อความ */
h1 {
  color: #0077cc;
  text-align: center;
  margin: 10px;
}

/* 🎯 กล่องรูป/วิดีโอ (กลางจริง) */
.center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 220px;
}

/* 🖼️ + 🎥 */
#mainImage,
#catDance {
  width: 200px;
  border-radius: 15px;
}

/* 🎥 ซ่อนก่อน */
#catDance {
  display: none;
}

/* 🔘 ปุ่ม */
.buttons {
  margin-top: 20px;
  position: relative;
  width: 300px;
  height: 100px;
}

button {
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  position: absolute;
  cursor: pointer;
}

#yesBtn {
  left: 0;
  background: #28a745;
  color: white;
}

#noBtn {
  right: 0;
  background: #dc3545;
  color: white;
}

#result {
  margin-top: 15px;
  font-size: 20px;
  color: #0077cc;
  text-align: center;
}
</style>
</head>

<body>

<div class="stage">

  <h1 id="question">
    You are invited to watch a movie with <br>
    <b>Namo Suppawet</b> <br>
    tomorrow at 8 PM 🎬
  </h1>

  <!-- 🎯 รูป/วิดีโออยู่กลางจริง -->
  <div class="center">
    <img id="mainImage" src="your-image.jpg">

    <video id="catDance" loop muted playsinline>
      <source src="scuba-cat.mp4" type="video/mp4">
    </video>
  </div>

  <!-- 🔘 ปุ่ม -->
  <div class="buttons">
    <button id="yesBtn" onclick="sayYes()">Yes 💙</button>
    <button id="noBtn">No 😭</button>
  </div>

  <div id="result"></div>

</div>

<!-- 🔊 เสียง -->
<audio id="yesSound" src="yes.mp3"></audio>
<audio id="noSound" src="no.mp3"></audio>
<audio id="scubaMusic" src="scuba.mp3" loop></audio>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const area = document.querySelector(".buttons");

let noClick = 0;

// ❌ No หนี
noBtn.addEventListener("click", (e) => {
  e.preventDefault();

  document.getElementById("noSound").play();

  const msgs = [
    "Really? 🥺",
    "Think again 😭",
    "Come on...",
    "Please 😢",
    "Just say yes 💙"
  ];

  document.getElementById("question").innerText =
    msgs[Math.min(noClick, msgs.length - 1)];

  noClick++;

  const maxX = area.clientWidth - noBtn.offsetWidth;
  noBtn.style.left = Math.random() * maxX + "px";
});

// ✅ YES → swap
function sayYes() {
  document.getElementById("yesSound").play();

  setTimeout(() => {
    document.getElementById("scubaMusic").play();
  }, 500);

  document.getElementById("result").innerText =
    "YAYYY 💙 See you tomorrow 🎬";

  // 🖼️ ซ่อนรูป
  document.getElementById("mainImage").style.display = "none";

  // 🎥 โชว์วิดีโอแทน
  const v = document.getElementById("catDance");
  v.style.display = "block";
  v.currentTime = 0;
  v.play();
}
</script>

</body>
</html>
