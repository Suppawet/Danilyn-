<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Invite 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #cceeff;
  height: 100vh;
  overflow: hidden;

  /* ✅ สำคัญ: ทำให้ layout อ้างอิงทั้งหน้า */
  position: relative;
}

.container {
  margin-top: 20px;
}

h1 {
  color: #0077cc;
  padding: 0 20px;
}

#mainImage {
  width: 200px;
  border-radius: 15px;
  margin: 15px 0;
}

/* 🎥 VIDEO (CENTER FIXED 100%) */
#catDance {
  width: 240px;
  display: none;
  border-radius: 12px;

  position: absolute;
  top: 50%;
  left: 50%;

  transform: translate(-50%, -50%);
  z-index: 10;
}

.buttons {
  position: relative;
  height: 300px;
  width: 100%;
  margin-top: 20px;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  position: absolute;
  transition: 0.2s;
}

#yesBtn {
  background: #28a745;
  color: white;
  left: 35%;
  top: 50%;
}

#noBtn {
  background: #dc3545;
  color: white;
  left: 55%;
  top: 50%;
}

#result {
  margin-top: 20px;
  font-size: 24px;
  color: #0077cc;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="question">
    You are invited to watch a movie with <br>
    <b>Namo Suppawet</b> <br>
    tomorrow at 8 PM 🎬
  </h1>

  <img id="mainImage" src="your-image.jpg">

  <!-- 🎥 Scuba Cat Video -->
  <video id="catDance" autoplay loop muted playsinline>
    <source src="scuba-cat.mp4" type="video/mp4">
  </video>

  <div class="buttons" id="btnArea">
    <button id="yesBtn" onclick="sayYes()">Yes 💙</button>
    <button id="noBtn">No 😭</button>
  </div>

  <div id="result"></div>

  <!-- 🔊 เสียง -->
  <audio id="yesSound" src="yes.mp3"></audio>
  <audio id="noSound" src="no.mp3"></audio>
  <audio id="scubaMusic" src="scuba.mp3" loop></audio>

</div>

<script>
let yesSize = 1;
let noClickCount = 0;

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const video = document.getElementById("catDance");
const area = document.getElementById("btnArea");

// ❌ No หนี
function moveNo() {
  const maxX = area.clientWidth - noBtn.offsetWidth;
  const maxY = area.clientHeight - noBtn.offsetHeight;

  noBtn.style.left = Math.random() * maxX + "px";
  noBtn.style.top = Math.random() * maxY + "px";
}

noBtn.addEventListener("click", (e) => {
  e.preventDefault();

  let sound = document.getElementById("noSound");
  sound.currentTime = 0;
  sound.play();

  noClickCount++;

  const messages = [
    "Really? 🥺",
    "Think again 😭",
    "Come on, please...",
    "I really want to go with you 😢",
    "Just say yes 💔",
    "PLEASE 😭💙"
  ];

  document.getElementById("question").innerText =
    messages[Math.min(noClickCount, messages.length - 1)];

  yesSize += 0.3;
  yesBtn.style.transform = `scale(${yesSize})`;

  setTimeout(moveNo, 50);
});

// ✅ YES
function sayYes() {
  let yesSound = document.getElementById("yesSound");
  let music = document.getElementById("scubaMusic");

  yesSound.currentTime = 0;
  yesSound.play();

  setTimeout(() => {
    music.currentTime = 0;
    music.play();
  }, 800);

  document.getElementById("result").innerText =
    "YAYYY 💙 See you tomorrow at 8 PM 😆🎬";

  document.getElementById("mainImage").style.display = "none";

  // 🎥 show video centered
  video.style.display = "block";
  video.currentTime = 0;
  video.play();
}
</script>

</body>
</html>
