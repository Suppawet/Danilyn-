<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Invite 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #cceeff;
  overflow: hidden;
}

/* 🧠 หน้าเริ่ม */
.stage {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 📝 ข้อความเริ่ม */
h1 {
  color: #0077cc;
  text-align: center;
}

/* 🎥 แมว */
#catDance {
  width: 200px;
  display: none;
  border-radius: 15px;
  transition: all 0.8s ease;
}

/* 🔘 ปุ่ม */
.buttons {
  position: relative;
  width: 300px;
  height: 100px;
  margin-top: 15px;
}

button {
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  position: absolute;
  cursor: pointer;
}

#yesBtn { left: 0; background: #28a745; color: white; }
#noBtn { right: 0; background: #dc3545; color: white; }

/* 🎉 result (จะเหลืออันเดียวตอนจบ) */
#result {
  margin-top: 15px;
  font-size: 24px;
  color: #0077cc;
  font-weight: bold;
  display: none;
}

/* 💥 ZOOM MODE หลัง YES */
.zoom {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(2.2);
  z-index: 9999;
}
</style>
</head>

<body>

<div class="stage" id="stage">

  <h1 id="question">
    You are invited to watch a movie with <br>
    <b>Namo Suppawet</b> <br>
    tomorrow at 8 PM 🎬
  </h1>

  <img id="mainImage" src="your-image.jpg">

  <video id="catDance" loop muted playsinline>
    <source src="scuba-cat.mp4" type="video/mp4">
  </video>

  <div class="buttons" id="buttons">
    <button id="yesBtn" onclick="sayYes()">Yes 💙</button>
    <button id="noBtn">No 😭</button>
  </div>

  <div id="result">YAYYY 💙 See you tomorrow 😆🎬</div>

</div>

<audio id="yesSound" src="yes.mp3"></audio>
<audio id="scubaMusic" src="scuba.mp3" loop></audio>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

let noClick = 0;

// ❌ No หนี
noBtn.addEventListener("click", () => {
  const msgs = [
    "Really? 🥺",
    "Think again 😭",
    "Come on...",
    "Please 😢",
    "Just say yes 💙"
  ];

  document.getElementById("question").innerText =
    msgs[Math.min(noClick, msgs.length - 1)];

  noClick++;

  const area = document.querySelector(".buttons");
  const maxX = area.clientWidth - noBtn.offsetWidth;
  noBtn.style.left = Math.random() * maxX + "px";
});

// ✅ YES → ZOOM + CLEAR SCREEN
function sayYes() {
  document.getElementById("yesSound").play();

  setTimeout(() => {
    document.getElementById("scubaMusic").play();
  }, 500);

  // 💥 ล้างทุกอย่างออก
  document.getElementById("question").style.display = "none";
  document.getElementById("mainImage").style.display = "none";
  document.getElementById("buttons").style.display = "none";

  // 🎥 show video
  const video = document.getElementById("catDance");
  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  // 🎯 zoom effect
  video.classList.add("zoom");

  // 🎉 show final text
  document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
