<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Invite 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #cceeff;
  text-align: center;
  overflow: hidden;
}

/* 🧠 หน้า */
.stage {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 🎥 container ของวิดีโอ */
.video-wrap {
  position: relative;
  width: 220px;
  height: 220px;
}

/* 🎥 video */
#catDance {
  width: 100%;
  height: 100%;
  border-radius: 15px;
  display: none;
  object-fit: cover;
  transition: transform 0.8s ease;
}

/* 💥 zoom */
.zoom {
  transform: scale(2);
}

/* 💙 ข้อความ overlay */
#result {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  font-size: 20px;
  font-weight: bold;
  color: white;
  text-shadow: 0 2px 10px black;

  display: none;
  z-index: 2;
}

/* 🖼️ รูป */
#mainImage {
  width: 200px;
  border-radius: 15px;
}

/* 🔘 ปุ่ม */
button {
  margin-top: 15px;
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #28a745;
  color: white;
}
</style>
</head>

<body>

<div class="stage">

  <h1 id="question">
    You are invited to watch a movie 🎬
  </h1>

  <img id="mainImage" src="your-image.jpg">

  <!-- 🎥 video + text overlay -->
  <div class="video-wrap">

    <video id="catDance" loop muted playsinline>
      <source src="scuba-cat.mp4" type="video/mp4">
    </video>

    <div id="result">YAYYY 💙 See you tomorrow 😆🎬</div>

  </div>

  <button onclick="sayYes()">Yes 💙</button>

</div>

<audio id="yesSound" src="yes.mp3"></audio>
<audio id="scubaMusic" src="scuba.mp3" loop></audio>

<script>
function sayYes() {

  document.getElementById("yesSound").play();

  setTimeout(() => {
    document.getElementById("scubaMusic").play();
  }, 300);

  // 🖼️ hide image
  document.getElementById("mainImage").style.display = "none";

  // 🎥 show video
  const v = document.getElementById("catDance");
  v.style.display = "block";
  v.currentTime = 0;
  v.play();

  // 💙 show text overlay
  document.getElementById("result").style.display = "block";

  // 💥 zoom effect
  setTimeout(() => {
    v.classList.add("zoom");
  }, 300);
}
</script>

</body>
</html>
